<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Настройка вьюпорта для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекинг человека</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s;
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        #gameContainer {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh; /* Занимает весь экран */
            background-color: #000;
        }

        /* Канвас растянут на весь контейнер (создает пропорции экрана телефона) */
        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Важно для сохранения пропорций камеры */
        }

        video {
            display: none;
        }

        #exitBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 16px;
            background-color: rgba(255, 59, 48, 0.8);
            color: white;
            border: none;
            border-radius: 10px;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Открыть трекинг на весь экран</button>

    <div id="gameContainer">
        <button id="exitBtn">Выйти</button>
        <!-- Скрытое видео для потока с камеры -->
        <video id="inputVideo" playsinline></video>
        <!-- Канвас для отрисовки картинки и квадратов -->
        <canvas id="outputCanvas"></canvas>
    </div>

    <!-- Подключаем MediaPipe через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        const startBtn = document.getElementById('startBtn');
        const gameContainer = document.getElementById('gameContainer');
        const exitBtn = document.getElementById('exitBtn');
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        // 1. Обработчик кнопки старта (Полноэкранный режим)
        startBtn.addEventListener('click', () => {
            gameContainer.style.display = 'block';
            startBtn.style.display = 'none';

            // Запрос полноэкранного режима
            if (gameContainer.requestFullscreen) {
                gameContainer.requestFullscreen();
            } else if (gameContainer.webkitRequestFullscreen) { /* iOS Safari */
                gameContainer.webkitRequestFullscreen();
            }

            // Инициализируем камеру и трекинг
            initCamera();
        });

        // Выход из полноэкранного режима
        exitBtn.addEventListener('click', () => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        });

        // Слушатель закрытия полноэкранного режима
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                gameContainer.style.display = 'none';
                startBtn.style.display = 'block';
                // Останавливаем камеру при выходе (опционально)
                if (videoElement.srcObject) {
                    videoElement.srcObject.getTracks().forEach(track => track.stop());
                }
            }
        });

        // 2. Настройка MediaPipe Pose
        const pose = new Pose({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
            }
        });

        pose.setOptions({
            modelComplexity: 1, // 0 (_lite_), 1 (full), 2 (heavy). 1 оптимально для телефонов
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 3. Обработка результатов от MediaPipe
        pose.onResults((results) => {
            // Подгоняем размер канваса под размер видео (с учетом пропорций экрана)
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;

            // Очищаем и рисуем кадр с камеры
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                // Вызываем функцию отрисовки квадратов
                drawBodyBoundingBoxes(results.poseLandmarks);
            }
            canvasCtx.restore();
        });

        // 4. Функция отрисовки квадратов (Голова и Тело)
        function drawBodyBoundingBoxes(landmarks) {
            // Индексы точек MediaPipe:
            // 0 - нос, 7/8 - уши, 11/12 - плечи, 23/24 - таз
            const nose = landmarks[0];
            const leftEar = landmarks[7];
            const rightEar = landmarks[8];
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];
            const leftHip = landmarks[23];
            const rightHip = landmarks[24];

            const w = canvasElement.width;
            const h = canvasElement.height;

            // --- РАСЧЕТ И ОТРИСОВКА ГОЛОВЫ ---
            // Берем среднюю точку между ушами для центра головы по X
            let headCenterX = ((leftEar.x + rightEar.x) / 2) * w;
            // Нос как верхняя точка
            let headTopY = (nose.y - 0.1) * h; // Немного поднимаем квадрат выше носа
            // Плечи как нижняя граница головы
            let headBottomY = ((leftShoulder.y + rightShoulder.y) / 2) * h;
            
            let headHeight = headBottomY - headTopY;
            let headWidth = headHeight * 0.8; // Делаем голову немного более вытянутой вниз

            canvasCtx.strokeStyle = '#00FF00'; // Зеленый цвет для головы
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(
                headCenterX - headWidth / 2, 
                headTopY, 
                headWidth, 
                headHeight
            );

            // --- РАСЧЕТ И ОТРИСОВКА ТЕЛА ---
            // Границы по осям X (от левого плеча/таза к правому)
            let bodyMinX = Math.min(leftShoulder.x, leftHip.x) * w;
            let bodyMaxX = Math.max(rightShoulder.x, rightHip.x) * w;
            
            // Границы по оси Y (от плеч до таза)
            let bodyMinY = Math.min(leftShoulder.y, rightShoulder.y) * h;
            let bodyMaxY = Math.max(leftHip.y, rightHip.y) * h;

            // Добавляем отступы (padding), чтобы квадрат не впритык
            let paddingX = (bodyMaxX - bodyMinX) * 0.3; 
            let paddingY = (bodyMaxY - bodyMinY) * 0.2;

            canvasCtx.strokeStyle = '#FF0000'; // Красный цвет для тела
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(
                bodyMinX - paddingX, 
                bodyMinY - paddingY, 
                (bodyMaxX - bodyMinX) + (paddingX * 2), 
                (bodyMaxY - bodyMinY) + (paddingY * 2)
            );
        }

        // 5. Запуск камеры
        function initCamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({ image: videoElement });
                },
                width: 640,
                height: 480, // Пропорция 4:3, как вы и просили
                facingMode: 'user' // Фронтальная камера
            });
            camera.start();
        }
    </script>
</body>
</html>
