<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Легкий трекинг</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            z-index: 10;
        }

        #gameContainer {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video {
            display: none;
        }

        #exitBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 16px;
            background-color: rgba(255, 59, 48, 0.8);
            color: white;
            border: none;
            border-radius: 10px;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Открыть на весь экран</button>

    <div id="gameContainer">
        <button id="exitBtn">Выйти</button>
        <video id="inputVideo" playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        const startBtn = document.getElementById('startBtn');
        const gameContainer = document.getElementById('gameContainer');
        const exitBtn = document.getElementById('exitBtn');
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        let cameraInstance = null;

        startBtn.addEventListener('click', () => {
            gameContainer.style.display = 'block';
            startBtn.style.display = 'none';
            if (gameContainer.requestFullscreen) gameContainer.requestFullscreen();
            else if (gameContainer.webkitRequestFullscreen) gameContainer.webkitRequestFullscreen();
            initCamera();
        });

        exitBtn.addEventListener('click', () => {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                gameContainer.style.display = 'none';
                startBtn.style.display = 'block';
                stopCamera();
            }
        });

        function stopCamera() {
            if (cameraInstance) {
                cameraInstance.stop();
                cameraInstance = null;
            }
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
            }
        }

        // Настройка максимально легкой модели Pose
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 0, // 0 = LITE (только базовые точки, минимум лагов)
            smoothLandmarks: true,
            enableSegmentation: false, // Отключено (съедает много ресурсов)
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let isProcessing = false;

        pose.onResults((results) => {
            isProcessing = false; // Сигнализируем, что обработка завершена

            if (!results.poseLandmarks) return;

            const w = canvasElement.width;
            const h = canvasElement.height;

            // Рисуем видео (оптимизированно)
            canvasCtx.drawImage(results.image, 0, 0, w, h);

            const lm = results.poseLandmarks;
            
            // В Lite-модели индексы те же: 0-нос, 7/8-уши, 11/12-плечи, 23/24-таз
            const nose = lm[0];
            const leftEar = lm[7];
            const rightEar = lm[8];
            const leftShoulder = lm[11];
            const rightShoulder = lm[12];
            const leftHip = lm[23];
            const rightHip = lm[24];

            // --- ГОЛОВА ---
            let headCenterX = ((leftEar.x + rightEar.x) / 2) * w;
            let headTopY = (nose.y - 0.1) * h; 
            let headBottomY = ((leftShoulder.y + rightShoulder.y) / 2) * h;
            let headHeight = headBottomY - headTopY;
            let headWidth = headHeight * 0.8;

            canvasCtx.strokeStyle = '#00FF00';
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(headCenterX - headWidth / 2, headTopY, headWidth, headHeight);

            // --- ТЕЛО ---
            let bodyMinX = Math.min(leftShoulder.x, leftHip.x) * w;
            let bodyMaxX = Math.max(rightShoulder.x, rightHip.x) * w;
            let bodyMinY = Math.min(leftShoulder.y, rightShoulder.y) * h;
            let bodyMaxY = Math.max(leftHip.y, rightHip.y) * h;

            let paddingX = (bodyMaxX - bodyMinX) * 0.3; 
            let paddingY = (bodyMaxY - bodyMinY) * 0.2;

            canvasCtx.strokeStyle = '#FF0000';
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(
                bodyMinX - paddingX, 
                bodyMinY - paddingY, 
                (bodyMaxX - bodyMinX) + (paddingX * 2), 
                (bodyMaxY - bodyMinY) + (paddingY * 2)
            );
        });

        function initCamera() {
            // Задаем размер канваса один раз при старте
            canvasElement.width = 640;
            canvasElement.height = 480;

            cameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    // ВАЖНАЯ ОПТИМИЗАЦИЯ: 
                    // Не отправляем новый кадр в нейросеть, пока она не закончила обрабатывать предыдущий.
                    // Это спасает слабые телефоны от зависания.
                    if (isProcessing) return; 
                    isProcessing = true;
                    await pose.send({ image: videoElement });
                },
                width: 640,
                height: 480,
                facingMode: 'user'
            });
            cameraInstance.start();
        }
    </script>
</body>
</html>
