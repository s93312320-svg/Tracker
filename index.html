<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Легкий скелет</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        #gameContainer {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video { display: none; }

        #exitBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 16px;
            background-color: rgba(255, 59, 48, 0.8);
            color: white;
            border: none;
            border-radius: 10px;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Открыть на весь экран</button>

    <div id="gameContainer">
        <button id="exitBtn">Выйти</button>
        <video id="inputVideo" playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        const startBtn = document.getElementById('startBtn');
        const gameContainer = document.getElementById('gameContainer');
        const exitBtn = document.getElementById('exitBtn');
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        let cameraInstance = null;
        let lastFrameTime = 0;
        // ЖЕСТКОЕ ОГРАНИЧЕНИЕ FPS для телефона 2016 года (например, 20 кадров в секунду)
        // Если все еще лагает, поменяйте 50 на 100 (будет 10 FPS, но без зависаний)
        const targetFrameDelay = 1000 / 20; 

        startBtn.addEventListener('click', () => {
            gameContainer.style.display = 'block';
            startBtn.style.display = 'none';
            if (gameContainer.requestFullscreen) gameContainer.requestFullscreen();
            else if (gameContainer.webkitRequestFullscreen) gameContainer.webkitRequestFullscreen();
            initCamera();
        });

        exitBtn.addEventListener('click', () => {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                gameContainer.style.display = 'none';
                startBtn.style.display = 'block';
                stopCamera();
            }
        });

        function stopCamera() {
            if (cameraInstance) { cameraInstance.stop(); cameraInstance = null; }
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
            }
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 0, // Самая легкая модель
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let isProcessing = false;

        pose.onResults((results) => {
            isProcessing = false;
            if (!results.poseLandmarks) return;

            const w = canvasElement.width;
            const h = canvasElement.height;

            // ИСПРАВЛЕНИЕ ЗЕРКАЛА: Отзеркаливаем канвас по горизонтали
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, w, h);
            canvasCtx.translate(w, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, w, h);
            canvasCtx.restore();

            const lm = results.poseLandmarks;

            // Подключения для базового скелета (только торс, руки и ноги)
            // Индексы: 0-нос, 11-12 плечи, 13-14 локти, 15-16 кисти, 23-24 таз, 25-26 колени, 27-28 стопы
            const connections = [
                [11, 12], // Плечи
                [11, 13], [13, 15], // Левая рука
                [12, 14], [14, 16], // Правая рука
                [11, 23], [12, 24], // Бока торса
                [23, 24], // Таз
                [23, 25], [25, 27], // Левая нога
                [24, 26], [26, 28]  // Правая нога
            ];

            // НАСТРОЙКИ ОТРИСОВКИ (Тонкие линии = быстрее отрисовка)
            canvasCtx.strokeStyle = '#00FF00';
            canvasCtx.lineWidth = 2;

            // Рисуем линии скелета
            for (const [i, j] of connections) {
                const pointA = lm[i];
                const pointB = lm[j];
                
                // Проверяем, видны ли точки (видимость > 0.5)
                if (pointA.visibility > 0.5 && pointB.visibility > 0.5) {
                    canvasCtx.beginPath();
                    // Отзеркаливаем координаты по X (умножаем на -1 и прибавляем ширину)
                    canvasCtx.moveTo((1 - pointA.x) * w, pointA.y * h);
                    canvasCtx.lineTo((1 - pointB.x) * w, pointB.y * h);
                    canvasCtx.stroke();
                }
            }

            // Рисуем точки суставов (маленькие кружки)
            canvasCtx.fillStyle = '#FF0000';
            const keyPoints = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
            for (const i of keyPoints) {
                const point = lm[i];
                if (point.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.arc((1 - point.x) * w, point.y * h, 4, 0, 2 * Math.PI);
                    canvasCtx.fill();
                }
            }
        });

        function initCamera() {
            // Уменьшаем разрешение! 320x240 (4:3) сильно разгрузит телефон 2016 года
            canvasElement.width = 320;
            canvasElement.height = 240;

            cameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    const now = performance.now();
                    // Проверяем, прошло ли достаточно времени для следующего кадра
                    if (now - lastFrameTime < targetFrameDelay || isProcessing) return; 
                    
                    lastFrameTime = now;
                    isProcessing = true;
                    await pose.send({ image: videoElement });
                },
                width: 320,   // Снижаем разрешение потока с камеры
                height: 240,  // Это даст огромный прирост производительности
                facingMode: 'user'
            });
            cameraInstance.start();
        }
    </script>
</body>
</html>
